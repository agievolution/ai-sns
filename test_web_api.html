<!DOCTYPE html>
<html>
<head>
    <title>Web Module Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Web Module API Test</h1>

    <div class="section">
        <h2>Test API Connection</h2>
        <button onclick="testAPI()">Test API</button>
        <pre id="result"></pre>
    </div>

    <script>
        async function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Loading...';

            try {
                const response = await fetch('http://localhost:8788/api/system/web-mng');
                const data = await response.json();

                resultEl.textContent = JSON.stringify(data, null, 2);

                if (data.success && data.data) {
                    const llmCount = data.data.filter(item => item.type === 'LLM').length;
                    const toolCount = data.data.filter(item => item.type === 'Tool').length;
                    console.log(`Found ${llmCount} LLM items and ${toolCount} Tool items`);
                }
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                console.error('API Error:', error);
            }
        }
    </script>
</body>
</html>
